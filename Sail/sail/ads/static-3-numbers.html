<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Tajawal',sans-serif;background:#0a0a0a;color:#fff;overflow:hidden;position:relative}
.container{width:100%;height:100%;display:flex;flex-direction:column;padding:60px;justify-content:space-between}

.tag{display:inline-block;background:#ef4444;color:#fff;padding:8px 24px;border-radius:8px;font-size:22px;font-weight:700;margin-bottom:20px}

.big-number{font-size:180px;font-weight:900;color:#fff;line-height:1;letter-spacing:-8px}
.big-number span{color:#3B82F6}

.subtitle{font-size:40px;font-weight:700;color:#ccc;margin-top:10px;line-height:1.4}

/* Stats row */
.stats{display:flex;gap:20px;margin:30px 0}
.stat{flex:1;background:#111;border:1px solid #222;border-radius:16px;padding:24px;text-align:center}
.stat-num{font-size:48px;font-weight:900;color:#3B82F6}
.stat-label{font-size:18px;color:#888;margin-top:8px}

/* WhatsApp preview */
.wa-preview{background:#0b141a;border-radius:16px;padding:20px;border:1px solid #1a2a35;display:flex;gap:16px;align-items:center}
.wa-icon{width:50px;height:50px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.wa-text{font-size:22px;color:#e9edef}
.wa-text .highlight{color:#3B82F6;font-weight:700}

/* Bottom */
.bottom{display:flex;justify-content:space-between;align-items:flex-end}
.cta-btn{background:#3B82F6;color:#fff;padding:16px 48px;border-radius:50px;font-size:26px;font-weight:700}
.brand{font-size:22px;color:#444}
.disclaimer{font-size:14px;color:#333;position:absolute;bottom:20px;left:60px}
</style>
</head>
<body>
<div class="container">
  <div>
    <div class="tag">كل أسبوع تخسر:</div>
    <div class="big-number"><span>١١</span> ساعة</div>
    <div class="subtitle">على إدخال فواتير يدوي.<br>= ٤٤ ساعة بالشهر. = أسبوع كامل.</div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">٣٠</div>
      <div class="stat-label">دقيقة / فاتورة يدوي</div>
    </div>
    <div class="stat">
      <div class="stat-num">ثواني</div>
      <div class="stat-label">مع وكيلك الذكي</div>
    </div>
    <div class="stat">
      <div class="stat-num">٠٪</div>
      <div class="stat-label">أخطاء إدخال</div>
    </div>
  </div>

  <div class="wa-preview">
    <div class="wa-icon">💬</div>
    <div class="wa-text">"سجّل الفواتير ذي" → <span class="highlight">تم التسجيل شامل الضريبة ✅</span></div>
  </div>

  <div class="bottom">
    <div class="cta-btn">جرب مجاناً</div>
    <div class="brand">sailsolutions.ai</div>
  </div>
</div>
<div class="disclaimer">*بيانات توضيحية | وكيل ذكاء اصطناعي</div>
</body>
</html>
