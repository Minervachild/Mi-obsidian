<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Tajawal',sans-serif;background:#050510;color:#fff;overflow:hidden;position:relative}
.container{width:100%;height:100%;display:flex;flex-direction:column;padding:60px}

/* Glow effect */
.glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,0.15) 0%,transparent 70%);pointer-events:none}

/* Time */
.time-display{font-size:120px;font-weight:900;color:#3B82F6;text-align:center;margin-top:40px;letter-spacing:-4px}
.time-label{font-size:28px;color:#444;text-align:center;margin-bottom:40px}

/* Headline */
.headline{font-size:48px;font-weight:800;text-align:center;line-height:1.5;margin-bottom:30px}
.headline .dim{color:#444}

/* Phone mockup */
.phone{background:#0b141a;border-radius:24px;padding:20px;max-width:600px;margin:0 auto;border:1px solid #1a2a35;box-shadow:0 0 60px rgba(59,130,246,0.1)}
.wa-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.wa-avatar{width:36px;height:36px;border-radius:50%;background:#3B82F6;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.wa-bubble{background:#1f2c34;border-radius:12px;padding:14px 18px;font-size:22px;color:#e9edef;flex:1}
.wa-bubble .num{color:#3B82F6;font-weight:800;font-size:28px}

/* Bottom */
.bottom{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end}
.cta-btn{background:#3B82F6;color:#fff;padding:16px 48px;border-radius:50px;font-size:26px;font-weight:700}
.brand{font-size:22px;color:#444}
.disclaimer{font-size:14px;color:#333;position:absolute;bottom:20px;left:60px}
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div class="time-display">٢:٠٠</div>
  <div class="time-label">الفجر</div>
  
  <div class="headline">
    ما تقدر تنام.<br>
    <span class="dim">فاتح التطبيق تدور رقم.</span><br>
    مو لاقيه.
  </div>

  <div class="phone">
    <div class="wa-row">
      <div class="wa-avatar">⚓</div>
      <div class="wa-bubble">
        كم الرصيد الحالي؟<br>
        <div style="margin-top:8px">
          💰 الرصيد: <span class="num">١٤٧٬٣٢٠ ر.س</span><br>
          📊 فواتير متأخرة: ٣ (١٢٬٨٠٠ ر.س)<br>
          ✅ مبيعات اليوم: ٨٬٤٥٠ ر.س
        </div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div>
      <div class="cta-btn">جرب مجاناً</div>
    </div>
    <div class="brand">sailsolutions.ai</div>
  </div>
</div>
<div class="disclaimer">*بيانات توضيحية | وكيل ذكاء اصطناعي</div>
</body>
</html>
