<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Tajawal',sans-serif;background:#0a0a0a;color:#fff;overflow:hidden;position:relative}
.container{width:100%;height:100%;display:flex;flex-direction:column;padding:60px 60px 40px}

/* Quote — top center */
.quote-section{text-align:center;margin-bottom:24px}
.quote{font-size:68px;font-weight:900;line-height:1.3}
.quote em{font-style:normal;color:#3B82F6}
.attribution{font-size:30px;color:#555;margin-top:12px}

/* WhatsApp — centered, compact */
.mockup{background:#0b141a;border-radius:20px;padding:20px 24px;margin:0 auto 24px;max-width:750px;border:1px solid #1a2a35}
.wa-msg{background:#005c4b;border-radius:12px;padding:12px 18px;margin-bottom:10px;font-size:24px;color:#e9edef;display:inline-block}
.wa-bot{background:#1f2c34;border-radius:12px;padding:12px 18px;font-size:24px;color:#e9edef}
.wa-bot .check{color:#25D366;font-weight:700}

/* Benefits — BIG, right below mockup */
.benefits{display:flex;gap:16px;margin-bottom:24px}
.benefit{flex:1;background:#111;border:1px solid #1a1a1a;border-radius:16px;padding:28px 16px;text-align:center}
.benefit .num{font-size:52px;font-weight:900;color:#3B82F6;display:block;margin-bottom:6px}
.benefit .label{font-size:20px;color:#999;line-height:1.3}

/* CTA — bottom */
.cta-row{display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.cta-left{display:flex;align-items:center;gap:16px}
.cta-btn{background:#3B82F6;color:#fff;padding:18px 56px;border-radius:50px;font-size:28px;font-weight:800}
.tagline{font-size:22px;color:#666}
.brand{font-size:22px;color:#444}
.disclaimer{font-size:13px;color:#333;position:absolute;bottom:14px;right:60px}
</style>
</head>
<body>
<div class="container">
  <div class="quote-section">
    <div class="quote">"أحب أدخل فواتير <em>يدوي</em>"</div>
    <div class="attribution">— ما أحد قالها. أبداً.</div>
  </div>

  <div class="mockup">
    <div style="text-align:left"><div class="wa-msg">سجّل الفواتير ذي 📸📸</div></div>
    <div style="text-align:right"><div class="wa-bot"><span class="check">✅</span> تم تسجيل ٣ فواتير — ١١٬٨٣٠ ر.س شامل الضريبة</div></div>
  </div>

  <div class="benefits">
    <div class="benefit">
      <span class="num">٣٠</span>
      <span class="label">دقيقة توفرها<br>لكل فاتورة</span>
    </div>
    <div class="benefit">
      <span class="num">٢٤/٧</span>
      <span class="label">يشتغل بدون<br>إجازات</span>
    </div>
    <div class="benefit">
      <span class="num">٠٪</span>
      <span class="label">أخطاء<br>بشرية</span>
    </div>
  </div>

  <div class="cta-row">
    <div class="cta-left">
      <div class="cta-btn">جرب مجاناً</div>
      <div class="tagline">وكيل محاسبة ذكي — على واتساب</div>
    </div>
    <div class="brand">sailsolutions.ai</div>
  </div>
</div>
<div class="disclaimer">*بيانات توضيحية | وكيل ذكاء اصطناعي</div>
</body>
</html>
