<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1080px;font-family:'Tajawal',sans-serif;background:#0a0a0a;color:#fff;overflow:hidden;position:relative}
.container{width:100%;height:100%;display:flex;flex-direction:column;padding:60px;justify-content:space-between}

/* Red tag */
.tag{display:inline-block;background:#ef4444;color:#fff;padding:10px 28px;border-radius:10px;font-size:24px;font-weight:700;margin-bottom:24px}

/* Big number - cleaner */
.hero{text-align:center;margin-bottom:20px}
.big-num{font-size:200px;font-weight:900;color:#3B82F6;line-height:0.9;letter-spacing:-8px}
.big-unit{font-size:80px;font-weight:900;color:#fff;margin-right:10px}
.context{font-size:36px;color:#999;margin-top:16px;line-height:1.5}
.context strong{color:#fff;font-weight:800}

/* Comparison - clean two column */
.comparison{display:flex;gap:0;margin:20px 0;border-radius:16px;overflow:hidden}
.comp-col{flex:1;padding:28px;text-align:center}
.comp-bad{background:#1a0505;border:1px solid #331111}
.comp-good{background:#051a0d;border:1px solid #113322}
.comp-label{font-size:18px;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:2px}
.comp-num{font-size:56px;font-weight:900;margin-bottom:4px}
.comp-bad .comp-num{color:#ef4444}
.comp-good .comp-num{color:#10B981}
.comp-desc{font-size:18px;color:#888}

/* WhatsApp one-liner */
.wa-bar{background:#0b141a;border-radius:14px;padding:18px 24px;border:1px solid #1a2a35;display:flex;align-items:center;gap:14px;margin-bottom:20px}
.wa-icon{font-size:28px}
.wa-text{font-size:22px;color:#e9edef}
.wa-text .hl{color:#10B981;font-weight:700}

/* CTA */
.cta-row{display:flex;justify-content:space-between;align-items:center}
.cta-btn{background:#3B82F6;color:#fff;padding:18px 56px;border-radius:50px;font-size:28px;font-weight:800}
.brand{font-size:22px;color:#444}
.disclaimer{font-size:13px;color:#333;position:absolute;bottom:14px;right:60px}
</style>
</head>
<body>
<div class="container">
  <div>
    <div class="tag">⚠️ كل أسبوع تخسر</div>
    <div class="hero">
      <span class="big-num">١١</span><span class="big-unit">ساعة</span>
      <div class="context">على إدخال فواتير يدوي<br><strong>٤٤ ساعة بالشهر = أسبوع كامل ضايع</strong></div>
    </div>
  </div>

  <div class="comparison">
    <div class="comp-col comp-bad">
      <div class="comp-label">يدوي</div>
      <div class="comp-num">٣٠ د</div>
      <div class="comp-desc">لكل فاتورة</div>
    </div>
    <div class="comp-col comp-good">
      <div class="comp-label">مع Sail</div>
      <div class="comp-num">ثواني</div>
      <div class="comp-desc">لكل فاتورة</div>
    </div>
  </div>

  <div class="wa-bar">
    <span class="wa-icon">💬</span>
    <div class="wa-text">"سجّل الفواتير" → <span class="hl">✅ تم — شامل الضريبة</span></div>
  </div>

  <div class="cta-row">
    <div class="cta-btn">جرب مجاناً</div>
    <div class="brand">sailsolutions.ai</div>
  </div>
</div>
<div class="disclaimer">*بيانات توضيحية | وكيل ذكاء اصطناعي</div>
</body>
</html>
